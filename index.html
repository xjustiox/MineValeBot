<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamCity Ultimate Dashboard</title>
    <style>
        :root {
            --bg-base: #0b0c10;
            --bg-surface: #13151a;
            --bg-element: #1c1f26;
            --bg-input: #0f1115;
            --color-brand: #5865F2;
            --text-primary: #f5f6f8;
            --text-secondary: #989aa2;
            --color-success: #23a55a;
            --color-danger: #f23f43;
            --color-warning: #f0b232;
            --border-smooth: rgba(255, 255, 255, 0.04);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: var(--bg-base); color: var(--text-primary); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background: var(--bg-surface); padding: 30px 20px; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid var(--border-smooth); }
        .sidebar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 35px; }
        .sidebar-header h2 { margin: 0; font-size: 1.25rem; font-weight: 700; }
        .nav-list { display: flex; flex-direction: column; gap: 6px; }
        .nav-item { background: transparent; color: var(--text-secondary); border: none; padding: 12px 14px; text-align: left; width: 100%; font-size: 0.9rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.15s; }
        .nav-item:hover, .nav-item.active { background: rgba(88, 101, 242, 0.1); color: var(--color-brand); font-weight: 600; }

        .content-area { flex: 1; padding: 50px; overflow-y: auto; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        h1 { margin-top: 0; font-size: 1.75rem; font-weight: 700; margin-bottom: 30px; }
        .panel-card { background: var(--bg-surface); padding: 30px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border-smooth); }
        .panel-card h3 { margin-top: 0; font-size: 1.1rem; margin-bottom: 25px; display: flex; align-items: center; gap: 8px; }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border-smooth); }
        .switch-container { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch-container input { opacity: 0; width: 0; height: 0; }
        .switch-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2e333d; transition: .2s; border-radius: 24px; }
        .switch-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #fff; transition: .2s; border-radius: 50%; }
        input:checked + .switch-slider { background-color: var(--color-brand); }
        input:checked + .switch-slider:before { transform: translateX(20px); }

        .input-box { margin-bottom: 20px; display: flex; flex-direction: column; }
        .input-box label { margin-bottom: 8px; color: var(--text-secondary); font-weight: 500; font-size: 0.85rem; }
        input, select, textarea { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-smooth); padding: 12px 14px; border-radius: 8px; font-size: 0.9rem; }
        input:focus, select:focus, textarea:focus { border-color: var(--color-brand); outline: none; }
        textarea { resize: vertical; min-height: 80px; }

        .action-btn { background: var(--color-brand); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
        .action-btn-danger { background: rgba(242, 63, 67, 0.1); color: var(--color-danger); border: none; padding: 12px; border-radius: 8px; cursor: pointer; }

        #status-toast { position: fixed; bottom: 30px; right: 30px; padding: 14px 24px; border-radius: 8px; font-size: 0.9rem; display: none; background: var(--bg-surface); border: 1px solid var(--border-smooth); z-index: 1000; }
    </style>
</head>
<body>

<div id="status-toast"></div>

<div class="sidebar">
    <div>
        <div class="sidebar-header"><h2>StreamCity v2</h2></div>
        <div class="nav-list">
            <button class="nav-item active" onclick="changePanel('overview', this)">📊 Systemstatus</button>
            <button class="nav-item" onclick="changePanel('modules', this)">🧩 Module</button>
            <button class="nav-item" onclick="changePanel('welcomer', this)">🖼️ Welcomer Embed-Designer</button>
            <button class="nav-item" onclick="changePanel('logging', this)">📜 Log-Kanäle</button>
            <button class="nav-item" onclick="changePanel('automod', this)">🛡️ AutoMod</button>
        </div>
    </div>
    <button class="action-btn-danger" onclick="triggerCoreRestart()">🔄 Bot Reboots</button>
</div>

<div class="content-area">
    
    <div id="overview" class="tab-panel active">
        <h1>Dashboard-Zentrale</h1>
        <div class="panel-card"><h3>Live-Status: <span id="bot-status" style="color:var(--color-success)">Online</span></h3><p id="bot-ping">0 ms Latenz</p></div>
    </div>

    <div id="modules" class="tab-panel">
        <h1>Module steuern</h1>
        <div class="panel-card">
            <div class="toggle-row"><div><h5>Willkommens-Embeds</h5></div><label class="switch-container"><input type="checkbox" id="mod-welcomer"><span class="switch-slider"></span></label></div>
            <div class="toggle-row"><div><h5>AutoMod-System</h5></div><label class="switch-container"><input type="checkbox" id="mod-automod"><span class="switch-slider"></span></label></div>
            <button class="action-btn" style="margin-top:20px;" onclick="pushSettings()">Module Speichern</button>
        </div>
    </div>

    <div id="welcomer" class="tab-panel">
        <h1>🖼️ Welcomer Embed Designer</h1>
        <div class="panel-card">
            <div class="input-box"><label>Zielkanal für Willkommens-Embeds</label><select id="welcomeChannelSelect"></select></div>
            <div class="input-box"><label>Embed Titel</label><input type="text" id="embedTitle"></div>
            <div class="input-box"><label>Embed Beschreibung ({user} und {server} nutzen)</label><textarea id="embedDesc"></textarea></div>
            <div class="input-box"><label>Embed Farbe (Hex-Code)</label><input type="color" id="embedColor" style="height:45px; padding:2px;"></div>
            <div class="input-box"><label>Großes Bild (Bild-URL)</label><input type="text" id="embedImage" placeholder="https://example.com/bild.png"></div>
            <button class="action-btn" onclick="pushSettings()">Embed Live Schalten 🔥</button>
        </div>
    </div>

    <div id="logging" class="tab-panel">
        <h1>📜 Getrenntes Log-Kanal Setup</h1>
        <div class="panel-card">
            <h3>Kanal-Routing</h3>
            <div class="input-box"><label>Moderations-Logs (z.B. für /kick Befehle)</label><select id="modLogSelect"></select></div>
            <div class="input-box"><label>AutoMod-Logs (Zensierte Wörter & Links)</label><select id="autoModLogSelect"></select></div>
            <button class="action-btn" onclick="pushSettings()">Log-Kanäle speichern</button>
        </div>
    </div>

    <div id="automod" class="tab-panel">
        <h1>🛡️ AutoMod Einstellungen</h1>
        <div class="panel-card">
            <div class="toggle-row"><div><h5>Links filtern</h5></div><label class="switch-container"><input type="checkbox" id="am-blockLinks"><span class="switch-slider"></span></label></div>
            <div class="input-box" style="margin-top:20px;"><label>Gesperrte Wörter (kommagetrennt)</label><textarea id="am-blockedWords"></textarea></div>
            <button class="action-btn" onclick="pushSettings()">AutoMod aktualisieren</button>
        </div>
    </div>

</div>

<script>
    const API_URL = "https://streamcitytool-7cz3.onrender.com";

    function changePanel(id, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function syncData() {
        showToast("Synchronisiere...", "var(--color-warning)");
        try {
            const res = await fetch(`${API_URL}/api/stats`);
            const data = await res.json();
            
            document.getElementById("bot-ping").innerText = `${data.ping} ms API Latenz`;
            
            // Kanallisten befüllen
            buildChannelDropdown("welcomeChannelSelect", data.availableChannels, data.config.welcomeChannelId);
            buildChannelDropdown("modLogSelect", data.availableChannels, data.config.channels?.modLogId);
            buildChannelDropdown("autoModLogSelect", data.availableChannels, data.config.channels?.autoModLogId);

            // Embed-Daten setzen
            document.getElementById("embedTitle").value = data.config.welcomeEmbed?.title || "";
            document.getElementById("embedDesc").value = data.config.welcomeEmbed?.description || "";
            document.getElementById("embedColor").value = data.config.welcomeEmbed?.color || "#5865F2";
            document.getElementById("embedImage").value = data.config.welcomeEmbed?.image || "";

            // Toggles & Rest
            document.getElementById("mod-welcomer").checked = data.config.modules?.welcomer;
            document.getElementById("mod-automod").checked = data.config.modules?.automod;
            document.getElementById("am-blockLinks").checked = data.config.automod?.blockLinks;
            document.getElementById("am-blockedWords").value = data.config.automod?.blockedWords || "";

            showToast("Verbunden!", "var(--color-success)", 2000);
        } catch (e) { showToast("Verbindungsfehler", "var(--color-danger)"); }
    }

    function buildChannelDropdown(elementId, channels, selectedId) {
        const select = document.getElementById(elementId);
        select.innerHTML = `<option value="">-- Kein Kanal ausgewählt --</option>`;
        channels.forEach(c => {
            select.innerHTML += `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}># ${c.name}</option>`;
        });
    }

    async function pushSettings() {
        showToast("Speichere...", "var(--color-warning)");
        const payload = {
            welcomeChannelId: document.getElementById("welcomeChannelSelect").value || null,
            welcomeEmbed: {
                title: document.getElementById("embedTitle").value,
                description: document.getElementById("embedDesc").value,
                color: document.getElementById("embedColor").value,
                thumbnail: "{user_avatar}",
                image: document.getElementById("embedImage").value
            },
            channels: {
                modLogId: document.getElementById("modLogSelect").value || null,
                autoModLogId: document.getElementById("autoModLogSelect").value || null
            },
            modules: {
                welcomer: document.getElementById("mod-welcomer").checked,
                automod: document.getElementById("mod-automod").checked,
                levels: true, fun: true
            },
            automod: {
                blockLinks: document.getElementById("am-blockLinks").checked,
                antiSpam: true,
                blockedWords: document.getElementById("am-blockedWords").value
            }
        };

        try {
            await fetch(`${API_URL}/api/settings`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            showToast("Gespeichert! ✨", "var(--color-brand)", 2000);
        } catch (e) { showToast("Fehler", "var(--color-danger)"); }
    }

    function showToast(t, c, d = 0) {
        const toast = document.getElementById("status-toast");
        toast.innerText = t; toast.style.borderLeft = `4px solid ${c}`; toast.style.display = "block";
        if (d > 0) setTimeout(() => toast.style.display = "none", d);
    }

    window.onload = syncData;
</script>
</body>
</html>
