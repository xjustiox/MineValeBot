<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Matrix Bot Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        button { background: #5865F2; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Matrix Bot Dashboard</h1>
    <div class="card">
        <h3>Server Statistik</h3>
        <p>Ping: <span id="ping">-</span> ms</p>
        <p>Mitglieder: <span id="members">-</span></p>
    </div>

    <div class="card">
        <h3>Blacklist Management</h3>
        <textarea id="blacklist" rows="4" style="width: 100%"></textarea>
        <button onclick="saveSettings()">Einstellungen speichern</button>
        <button onclick="restartBot()" style="background: #ed4245;">Reboot Bot</button>
    </div>

    <script>
        // Lade Daten vom Bot
        fetch('/api/stats').then(res => res.json()).then(data => {
            document.getElementById('ping').innerText = data.ping;
            document.getElementById('members').innerText = data.memberCount;
            document.getElementById('blacklist').value = data.config.automod.blockedWords;
        });

        // Einstellungen an den Bot senden
        function saveSettings() {
            const newWords = document.getElementById('blacklist').value;
            fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ automod: { blockedWords: newWords } })
            }).then(() => alert('Einstellungen aktualisiert!'));
        }

        function restartBot() {
            fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'restart' })
            });
        }
    </script>
</body>
</html>
