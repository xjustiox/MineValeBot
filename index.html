<!DOCTYPE html>
<html lang="de">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <style>
        body { background: #0f0c29; color: #fff; font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid #6366f1; }
    </style>
</head>
<body class="p-10">
    <h1 class="text-4xl text-center mb-10 text-purple-400">MATRIX CORE DASHBOARD</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
        <div class="glass p-6 rounded-2xl">
            <h2 class="text-blue-400 mb-4">WELCOMER</h2>
            <input id="wChannel" placeholder="Channel ID" class="w-full bg-black p-2 mb-2">
            <input id="wMsg" placeholder="Nachricht" class="w-full bg-black p-2 mb-4">
        </div>
        
        <div class="glass p-6 rounded-2xl">
            <h2 class="text-purple-400 mb-4">MODERATION</h2>
            <input id="lChannel" placeholder="Log-Channel ID" class="w-full bg-black p-2 mb-4">
        </div>
    </div>

    <div class="text-center mt-10">
        <button onclick="save()" class="bg-indigo-600 px-10 py-3 rounded-full hover:scale-105 transition">SPEICHERN</button>
    </div>

    <script>
        async function save() {
            const data = {
                welcomeChannelId: document.getElementById('wChannel').value,
                welcomeMessage: document.getElementById('wMsg').value,
                channels: { modLogId: document.getElementById('lChannel').value }
            };
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert('Daten im Matrix-Netzwerk aktualisiert!');
        }
    </script>
</body>
</html>
