<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn:hover { background: rgba(99, 102, 241, 0.15); border-left: 3px solid #6366f1; }
        .active-nav { background: rgba(99, 102, 241, 0.2); border-left: 3px solid #6366f1; }
        input, textarea { background: rgba(0,0,0,0.3) !important; border: 1px solid #334155 !important; transition: 0.3s; }
        input:focus { border-color: #6366f1 !important; outline: none; box-shadow: 0 0 8px rgba(99,102,241,0.5); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 p-8 border-r border-slate-800 flex flex-col">
        <h1 class="text-2xl font-bold mb-12 text-indigo-500 tracking-tighter">MATRIX<span class="text-white">CORE</span></h1>
        <nav class="space-y-4">
            <button onclick="tab('overview')" class="nav-btn w-full text-left p-4 rounded-lg active-nav">Dashboard</button>
            <button onclick="tab('welcomer')" class="nav-btn w-full text-left p-4 rounded-lg">Willkommen</button>
            <button onclick="tab('economy')" class="nav-btn w-full text-left p-4 rounded-lg">Wirtschaft</button>
            <button onclick="tab('settings')" class="nav-btn w-full text-left p-4 rounded-lg">System-Setup</button>
        </nav>
    </aside>

    <main class="flex-1 p-12">
        <div id="content" class="max-w-5xl mx-auto">
            
            <div id="tab-overview" class="tab-pane">
                <h2 class="text-4xl font-bold mb-8">System Übersicht</h2>
                <div class="grid grid-cols-3 gap-6">
                    <div class="glass-card p-8 rounded-2xl">
                        <p class="text-slate-400">System Ping</p>
                        <h3 id="ping" class="text-3xl font-bold mt-2 text-indigo-400">-- ms</h3>
                    </div>
                    <div class="glass-card p-8 rounded-2xl">
                        <p class="text-slate-400">Mitglieder</p>
                        <h3 id="members" class="text-3xl font-bold mt-2 text-purple-400">--</h3>
                    </div>
                </div>
            </div>

            <div id="tab-welcomer" class="tab-pane hidden">
                <h2 class="text-4xl font-bold mb-8">Welcomer Konfiguration</h2>
                <div class="glass-card p-8 rounded-2xl">
                    <label class="block text-sm text-slate-400 mb-2">Welcome Channel ID</label>
                    <input id="w-channel" class="w-full p-4 rounded-xl mb-6">
                    <label class="block text-sm text-slate-400 mb-2">Begrüßungsnachricht</label>
                    <textarea id="w-msg" class="w-full h-32 p-4 rounded-xl"></textarea>
                </div>
                <button onclick="save()" class="mt-6 bg-indigo-600 hover:bg-indigo-700 px-8 py-4 rounded-xl font-bold transition-all">Änderungen anwenden</button>
            </div>
            
            </div>
    </main>

    <script>
        function tab(id) {
            document.querySelectorAll('.tab-pane').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            event.target.classList.add('active-nav');
        }
        
        async function save() {
            // Fetch logic bleibt gleich wie vorher...
            alert("System synchronisiert.");
        }
    </script>
</body>
</html>
